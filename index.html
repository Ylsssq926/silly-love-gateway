      container.innerHTML = html;
    }

    /* ===== 图片加载回调 ===== */
    function imgLoaded(el) {
      el.classList.add('card__img--loaded');
      loadedSet[el.src] = true;
      var ph = el.parentNode.querySelector('.card__placeholder');
      if (ph) ph.style.display = 'none';
    }
    function imgError(el) {
      el.style.display = 'none';
      loadedSet[el.src] = true;
    }

    /* ===== 语言切换 ===== */
    function updateLangButtons() {
      var btns = document.querySelectorAll('.lang-btn');
      btns.forEach(function(btn) {
        btn.classList.toggle('lang-btn--active', btn.getAttribute('data-lang') === locale);
      });
    }

    document.getElementById('langSwitcher').addEventListener('click', function(e) {
      var btn = e.target.closest('.lang-btn');
      if (!btn) return;
      locale = btn.getAttribute('data-lang');
      applyTexts();
      renderChips();
      if (expanded) renderGrid(expanded);
      updateLangButtons();
    });

    /* ===== 初始化 ===== */
    applyTexts();
    renderChips();
    updateLangButtons();
  </script>
</body>
</html>
